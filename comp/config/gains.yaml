map_commit_speed_cap_mps: 3.5
map_commit_overspeed_pitch_trim_rad: 0.04
map_commit_post_plane_pitch_trim_rad: 0.02
map_commit_push_range_m: 1.2
map_commit_hold_line_start_m: -1.0
map_commit_line_pitch_trim_rad: 0.20
map_commit_near_pitch_trim_rad: 0.24
map_commit_push_pitch_trim_rad: 0.32
commit_thrust_boost: 0.06
